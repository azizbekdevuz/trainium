name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege for GITHUB_TOKEN (GitHub: use workflows with limited permissions)
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @apps/web prisma:generate

      - name: Lint (web)
        run: pnpm --filter @apps/web lint

      - name: Lint (socket)
        run: pnpm --filter @apps/socket lint

      - name: Typecheck
        run: pnpm --filter @apps/web typecheck

      - name: Test
        run: pnpm --filter @apps/web test
