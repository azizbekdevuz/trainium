services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build-time variables (NEXT_PUBLIC_* only - these are public keys, safe to embed)
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        # DATABASE_URL needed for static page generation during build
        DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=4000
      # Stable path independent of Next standalone cwd (see UPLOADS_DIR in .env.example)
      - UPLOADS_DIR=/data/uploads
    ports:
      - "127.0.0.1:3000:4000"
    restart: unless-stopped
    depends_on:
      - socket
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Named volume web_uploads → /data/uploads: survives container recreate & image rebuilds.
    # docker compose down -v removes named volumes (uploads lost). docker system prune does not
    # delete volumes in use; prune -a --volumes can remove unused volumes—know what you prune.
    # Backups: bind-mount host dir, e.g. /var/lib/trainium/uploads:/data/uploads
    volumes:
      - web_uploads:/data/uploads

  socket:
    build:
      context: .
      dockerfile: apps/socket/Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 6

volumes:
  web_uploads:
